general {
    colors = true
    interval = 5
}

order += "wireless _first_"
order += "ethernet _first_"
order += "battery all"
order += "disk /"
order += "load"
order += "memory"
order += "tztime local"

wireless _first_ {
    format_up = "W: (%quality at %essid) %ip"
    format_down = "W: down"
}

ethernet _first_ {
    format_up = "E: %ip (%speed)"
    format_down = "E: down"
}

battery all {
    format = "%status %percentage %remaining"
}

disk "/" {
    format = "/ %avail"
}

load {
    format = "load %1min"
}

memory {
    format = "mem %used/%total"
    threshold_degraded = "10%"
}

tztime local {
    format = "%Y-%m-%d %H:%M:%S"
}
